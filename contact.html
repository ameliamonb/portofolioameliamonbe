  <main class="contact-page">

    <section class="contact__form-side">

      <h1 class="contact__title">Let's Get in Touch</h1>

      <form class="contact__form" action="#" method="post">

        <div class="form__group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" placeholder="e.g. Manuel Montenegro" required>
        </div>

        <div class="form__group">
          <label for="email">Email Address:</label>
          <input type="email" id="email" name="email" placeholder="name@gmail.com" required>
        </div>

        <div class="form__group">
          <label for="phone">Phone Number:</label>
          <input type="tel" id="phone" name="phone" placeholder="+593 234 567 890">
        </div>

        <div class="form__group">
          <label for="message">Your Message:</label>
          <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit" class="contact__submit">Send Message</button>

      </form>

    </section>
<aside class="contact__photo-side">
  <img src="imgs/fotocv.png" alt="Amelia MonBe" class="contact__photo" width="800px">
